spring.application.name=mobile

# CORS Configuration (for LiveServer on port 5500)
server.servlet.context-path=/
spring.webflux.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080

# Frontend: serve static files from frontend folder (Lưu đâu nhớ đổi đường dẫn)
spring.web.resources.static-locations=file:C:/Users/Tuana/Downloads/phoneshop/frontend/,file:../frontend/,file:frontend/,classpath:/static/ 

#kết nối csdl (kết nối ntn nhớ đổi tk mk sau dấu :)

spring.datasource.url = ${APP_DB_URL:jdbc:mysql://localhost:3306/phoneshop_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username = ${APP_DB_USERNAME:root}
spring.datasource.password = ${APP_DB_PASSWORD:root}
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver
#JPA hibernate

spring.jpa.hibernate.ddl-auto= update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=16
#thymeleaf

spring.thymeleaf.cache=false
#server

server.port=8080
#gmail

spring.mail.host=${APP_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${APP_MAIL_PORT:587}
spring.mail.username = ${APP_MAIL_USERNAME:}

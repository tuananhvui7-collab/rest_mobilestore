<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>Đăng ký — PhoneShop</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--bg)}
    .auth-card{width:100%;max-width:400px;background:var(--bg-card);border-radius:var(--radius-xl);padding:32px 24px;box-shadow:var(--shadow-lg)}
    .auth-logo{text-align:center;margin-bottom:24px}
    .auth-logo h1{font-size:1.5rem}
    .auth-logo p{color:var(--text-secondary);font-size:0.875rem;margin-top:4px}
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Phone<span style="color:var(--accent)">Shop</span></h1>
        <p>Tạo tài khoản mới</p>
      </div>
      <form id="registerForm" class="flex-col gap-16">
        <div class="form-group">
          <label class="form-label">Họ và tên</label>
          <input type="text" id="fullName" class="form-input" placeholder="Nguyễn Văn A" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Số điện thoại</label>
          <input type="tel" id="phone" class="form-input" placeholder="0912 345 678" required>
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <input type="password" id="password" class="form-input" placeholder="Tối thiểu 6 ký tự" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Đăng ký</button>
      </form>
      <div class="text-center mt-20">
        <span class="text-sm text-muted">Đã có tài khoản?</span> <a href="login.html" class="text-sm fw-600">Đăng nhập</a>
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px"></div>';
      try {
        const res = await auth.register(
          document.getElementById('email').value,
          document.getElementById('password').value,
          document.getElementById('fullName').value,
          document.getElementById('phone').value
        );
        if (res.status === 200) {
          showToast('Đăng ký thành công! Đang chuyển sang đăng nhập...', 'success');
          setTimeout(() => navigate('login.html'), 1500);
        } else {
          showToast(res.message || 'Đăng ký thất bại', 'error');
          btn.disabled = false;
          btn.textContent = 'Đăng ký';
        }
      } catch {
        showToast('Lỗi kết nối server', 'error');
        btn.disabled = false;
        btn.textContent = 'Đăng ký';
      }
    });
  </script>
</body>
</html>
